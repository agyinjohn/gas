version: '3.8'

services:
  mongodb:
    image: mongo:7-jammy
    container_name: GetGas-mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: GetGas
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: GetGas-redis
    ports:
      - '6379:6379'
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: GetGas-backend
    ports:
      - '4000:4000'
    environment:
      - NODE_ENV=development
      - MONGODB_URI=mongodb://mongodb:27017/GetGas
      - REDIS_URL=redis://redis:6379
    env_file:
      - ./backend/.env
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./backend:/app
      - /app/node_modules
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: GetGas-frontend
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000
      - NEXT_PUBLIC_SOCKET_URL=http://localhost:4000
    env_file:
      - ./frontend/.env.local
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo_data:
